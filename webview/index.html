<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{CSP_SOURCE}}; style-src {{CSP_SOURCE}}; script-src 'nonce-{{NONCE}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="panel-title" content="SF Translations Manager" />
    <title>{{PANEL_TITLE}}</title>
    <link rel="stylesheet" href="{{STYLE_URI}}" />
  </head>
  <body>
    <header class="toolbar">
      <div class="titleBlock">
        <img class="appLogo" src="{{LOGO_URI}}" alt="" />
        <div class="titleText">
          <h1>SearchFunnel Translations</h1>
          <p id="summary" class="summary">Loading translations...</p>
        </div>
      </div>

      <div class="toolbarActions">
        <input
          id="searchInput"
          class="searchInput"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Search keys or values"
          aria-label="Search keys or values"
        />
        <div class="localeFilter">
          <button
            id="localeFilterButton"
            class="secondaryButton localeFilterButton"
            type="button"
            aria-haspopup="true"
            aria-expanded="false"
            disabled
          >
            Locales
          </button>
          <div id="localeFilterPanel" class="localeFilterPanel" hidden>
            <div id="localeFilterList" class="localeFilterList"></div>
          </div>
        </div>
        <button id="collapseAllButton" class="secondaryButton" type="button" disabled>
          Collapse all
        </button>
        <button id="openSettingsButton" class="secondaryButton" type="button">
          Settings
        </button>
        <button id="saveAllButton" class="primaryButton" type="button" disabled>
          Save all
        </button>
      </div>
    </header>

    <div id="status" class="status" role="status"></div>
    <main id="tableHost" class="tableHost">
      <div class="emptyState">Loading translations...</div>
    </main>

    <script nonce="{{NONCE}}" src="{{SCRIPT_URI}}"></script>
  </body>
</html>
